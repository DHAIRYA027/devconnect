name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Frontend: lint + production build ----------
  client:
    name: Client (lint & build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ---------- Backend: syntax check + end-to-end smoke test ----------
  server:
    name: Server (smoke test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 5050
      MONGO_URI: mongodb://127.0.0.1:27017/devconnect_ci
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - name: Syntax check
        run: npm run check
      - name: Start API
        run: npm start & npx wait-on http://localhost:5050/api/health --timeout 30000
      - name: Run smoke tests
        run: npm test
