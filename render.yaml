# Render Blueprint — deploys the DevConnect API as a free web service.
# In Render: New → Blueprint → connect this repo. It reads this file and
# prompts for the secrets marked `sync: false`.
services:
  - type: web
    name: devconnect-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random secret
      - key: MONGO_URI
        sync: false # paste your MongoDB Atlas connection string
      - key: CLIENT_URL
        sync: false # your Vercel frontend URL, e.g. https://devconnect.vercel.app
